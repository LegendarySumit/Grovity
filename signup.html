<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Grovity</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./dist/output.css" />
  <link rel="stylesheet" href="./theme-system.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <!-- Firebase configuration loader -->
  <script src="./src/js/config-loader.js"></script>
  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
  <!-- Firebase initialization -->
  <script src="./src/js/firebase-init-secure.js"></script>
  <!-- Shared auth guard -->
  <script src="./src/js/auth-guard.js"></script>
  <!-- Firestore Database Service -->
  <script src="./src/js/firestore-db.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen flex-col">

  <nav class="bg-slate-950/80 border-b border-slate-800 px-3 sm:px-4 md:px-10 py-3">
    <div class="flex items-center justify-between max-w-7xl mx-auto w-full">
      <a href="index.html" class="text-xl sm:text-2xl font-bold tracking-tight text-blue-400">
        Grovity
      </a>
      <a href="login.html" class="text-xs sm:text-sm text-slate-300 hover:text-blue-400 transition">
        Already have an account? Log in
      </a>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md space-y-8">
      <div class="text-center space-y-2">
        <p class="text-xs font-semibold tracking-[0.2em] text-purple-400 uppercase">
          Get started
        </p>
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight">
          Create your <span class="text-purple-400">Grovity</span> account
        </h1>
        <p class="text-xs md:text-sm text-slate-400">
          Save your tasks, focus sessions and progress securely across devices.
        </p>
      </div>

      <form class="space-y-4 sm:space-y-5 bg-slate-900/70 border border-slate-800 rounded-xl sm:rounded-2xl p-5 sm:p-6 shadow-lg">
        <div class="space-y-1 text-left">
          <label for="name" class="block text-xs font-medium text-slate-300">
            Full name
          </label>
          <input
            id="name"
            type="text"
            class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-purple-500"
            placeholder="John Doe"
          />
        </div>

        <div class="space-y-1 text-left">
          <label for="email" class="block text-xs font-medium text-slate-300">
            Email
          </label>
          <input
            id="email"
            type="email"
            class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-purple-500"
            placeholder="you@example.com"
          />
        </div>

        <div class="space-y-1 text-left">
          <label for="password" class="block text-xs font-medium text-slate-300">
            Password
          </label>
          <input
            id="password"
            type="password"
            class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-purple-500"
            placeholder="••••••••"
          />
        </div>

        <div class="space-y-1 text-left">
          <label for="confirm" class="block text-xs font-medium text-slate-300">
            Confirm password
          </label>
          <input
            id="confirm"
            type="password"
            class="w-full rounded-lg border border-slate-800 bg-slate-950 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-purple-500"
            placeholder="••••••••"
          />
        </div>

        <div class="text-[11px] text-slate-500">
          By creating an account, you agree to our
          <a href="#" class="text-purple-300 hover:text-purple-200">Terms</a>
          and
          <a href="#" class="text-purple-300 hover:text-purple-200">Privacy Policy</a>.
        </div>

        <button
          type="submit"
          class="w-full py-2.5 rounded-lg bg-purple-500 text-white text-sm font-medium hover:bg-purple-600 active:bg-purple-700 transition"
        >
          Sign up
        </button>

        <div id="authError" class="hidden rounded-lg bg-red-500/10 border border-red-500/30 px-3 py-2 text-xs text-red-400"></div>

        <button
          id="googleSignupBtn"
          type="button"
          class="w-full py-2.5 rounded-lg border border-slate-700 text-slate-200 text-sm font-medium hover:border-purple-400 hover:text-purple-300 transition flex items-center justify-center gap-2"
        >
          <i class="fa-brands fa-google text-base"></i>
          Sign up with Google
        </button>
      </form>
    </div>
  </main>

  <script>
    if (!window.__fbAuth) {
      console.error('Firebase auth unavailable on signup page.');
    }

    // Redirect already-logged-in users
    if (window.grovityAuthGuard && typeof window.grovityAuthGuard.redirectIfAuthenticated === 'function') {
      window.grovityAuthGuard.redirectIfAuthenticated('workspace.html');
    }

    function _postSignupRedirect(user) {
      if (window.grovityAuthGuard && typeof window.grovityAuthGuard.saveUser === 'function') {
        window.grovityAuthGuard.saveUser(user);
      }
      var selectedPlan = localStorage.getItem('grovity_selected_plan');
      if (selectedPlan) {
        localStorage.setItem('grovity_plan', selectedPlan);
        localStorage.removeItem('grovity_selected_plan');
      }
      var redirectTo = localStorage.getItem('grovity_redirect_after_login');
      localStorage.removeItem('grovity_redirect_after_login');
      window.location.href = redirectTo || 'workspace.html';
    }

    function _showError(msg) {
      var el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    // Email / password sign-up
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('authError').classList.add('hidden');

      var name     = document.getElementById('name').value.trim();
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirm  = document.getElementById('confirm').value;

      if (!name || !email || !password) return;
      if (password !== confirm) { _showError('Passwords do not match.'); return; }
      if (password.length < 6)  { _showError('Password must be at least 6 characters.'); return; }
      if (!window.__fbAuth) { _showError('Authentication is not available right now.'); return; }

      window.__fbAuth.createUserWithEmailAndPassword(email, password)
        .then(function(result) {
          return result.user.updateProfile({ displayName: name }).then(function() {
            return result.user;
          });
        })
        .then(function(user) { _postSignupRedirect(user); })
        .catch(function(err) {
          var msg = 'Sign-up failed. Please try again.';
          if (err.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
          else if (err.code === 'auth/invalid-email')  msg = 'Please enter a valid email address.';
          else if (err.code === 'auth/weak-password')  msg = 'Password must be at least 6 characters.';
          _showError(msg);
        });
    });

    // Google sign-up
    document.getElementById('googleSignupBtn').addEventListener('click', function() {
      document.getElementById('authError').classList.add('hidden');
      if (!window.__fbAuth || !window.__fbProvider) { _showError('Google sign-in is not available right now.'); return; }
      window.__fbAuth.signInWithPopup(window.__fbProvider)
        .then(function(result) { _postSignupRedirect(result.user); })
        .catch(function(err) { _showError(err.message); });
    });
  </script>

  <!-- Theme Toggle -->
  <button onclick="toggleTheme()" class="theme-toggle" aria-label="Toggle theme">
    <i id="themeIcon" class="fa-solid fa-sun"></i>
  </button>

  <script src="./theme-system.js"></script>
</body>
</html>
